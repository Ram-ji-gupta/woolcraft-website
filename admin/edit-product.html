<!DOCTYPE html>
<html>
<head>
<title>Edit Product</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="mobile-header">
<button class="menu-btn" onclick="toggleMenu()">☰</button>
<h2>🧶 WoolCraft</h2>
</div>

<div class="sidebar">
<h2 id="desktopLogo">
🧶 WoolCraft
</h2>
<a href="dashboard.html">
Dashboard
</a>

<a href="products.html">
Products
</a>

<a href="add-product.html">
Add Product
</a>

<button onclick="logout()">
Logout
</button>

</div>


<div class="content">

<h1>
Edit Product
</h1>

<input
type="text"
id="name"
placeholder="Product Name">

<select id="category">

<option>Apparels</option>

<option>Woven</option>

<option>Bags</option>

<option>Gift Sets</option>

</select>

<input
type="number"
id="price"
placeholder="Price">

<input
type="number"
id="stock"
placeholder="Stock">

<textarea
id="description"
placeholder="Description">
</textarea>

<input
type="file"
id="imageFile">

<button onclick="updateProduct()">

Update Product

</button>

</div>

<script src="js/editProduct.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
