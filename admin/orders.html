<!DOCTYPE html>
<html>
<head>
  <title>Orders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="mobile-header">
<button class="menu-btn" onclick="toggleMenu()">☰</button>
<h2>🧶 WoolCraft</h2>
</div>

<div class="sidebar">
  <h2 id="desktopLogo">
🧶 WoolCraft
</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="orders.html">Orders</a>
    <button onclick="logout()">Logout</button>
  </div>

<div class="content">
    <h1>Customer Orders</h1>
    <button class="save-btn" onclick="window.location='customers.html'">Customers</button>
    <button class="save-btn" onclick="window.location='products.html'">Products</button>


    <div class="bulk-status-bar">

      <div class="bulk-status-left">
        <label for="bulkStatusSelect">Change status for selected orders:</label>
        <select id="bulkStatusSelect">
          <option value="Pending">Pending</option>
          <option value="Processing">Processing</option>
          <option value="Shipped">Shipped</option>
          <option value="Delivered">Delivered</option>
        </select>
      </div>
      <div class="bulk-status-right">
        <button class="save-btn" onclick="updateStatusesForSelected()">Update Selected</button>
      </div>
    </div>

    <div id="ordersList"></div>
  </div>

  <script src="js/admin.js"></script>
  <script src="js/orders.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/globalSettings.js"></script>
  <script src="js/auth.js"></script>

  <script>
function toggleDarkMode(){
  const isDark = localStorage.getItem("darkMode")==="true";
  localStorage.setItem("darkMode", String(!isDark));
  document.body.classList.toggle("dark-mode", !isDark);
}
  </script>

  <button class="save-btn" onclick="toggleDarkMode()">🌙 Toggle Dark Mode</button>

  <script>
if(localStorage.getItem("darkMode")==="true"){
  document.body.classList.add("dark-mode");
}
</script>



</body>
</html>
