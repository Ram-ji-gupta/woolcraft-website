<!DOCTYPE html>
<html>
<head>

<title>Products</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet"
href="css/admin.css">

</head>

<body>
<div class="mobile-header">
<button class="menu-btn" onclick="toggleMenu()">☰</button>
<h2>🧶 WoolCraft</h2>
</div>

<div class="sidebar">
<h2 id="desktopLogo">
🧶 WoolCraft
</h2>
<a href="dashboard.html">
Dashboard
</a>

<a
href="products.html"
class="active">

Products

</a>

<a href="add-product.html">
Add Product
</a>

<button
onclick="logout()">

Logout

</button>

</div>


<div class="content">

<h1>
All Products
</h1>

<br><br>

<button
  onclick="window.location='add-product.html'"
  style="margin-bottom:18px;">Add Product</button>

<div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:18px;">
  <button
    id="filterBtn"
    type="button"
    onclick="searchProducts()"
    style="margin-left:0;">Filter</button>

  <input
    type="text"
    id="productSearch"
    placeholder="Search Products by name or category..."
    onkeyup="searchProducts()"
    style="margin-bottom:0; flex:1; min-width:220px;">

  <button
    id="clearSearchBtn"
    type="button"
    onclick="clearSearch()"
    style="margin-left:10px; display:none;">Clear</button>
</div>

<hr>

<div
id="productList">

</div>

</div>


<script src="js/auth.js"></script>

<script src="js/products.js"></script>

<script src="js/sidebar.js"></script>

<script src="js/globalSettings.js"></script>

<script>
if(localStorage.getItem("darkMode")==="true"){
document.body.classList.add("dark-mode");
}
</script>


</body>
</html>
