<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact WoolCraft Studio — Have questions or custom request details? Get in touch with us via phone, WhatsApp, or send a message.">

  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#7a4f3d">

  <!-- Open Graph -->
  <meta property="og:title" content="Contact Us | WoolCraft Studio">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contact Us | WoolCraft Studio">
  <meta name="twitter:description" content="Get in touch with WoolCraft Studio. Let us know your custom request or questions.">
  <meta name="twitter:image" content="https://woolcraftstudio.com/images/Sunflower.webp">

  <title>Contact Us | WoolCraft Studio</title>
  <link rel="icon" href="images/logo.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" media="print" onload="this.media='all'">

  <!-- Dark mode (must load before render to prevent FOUC) -->
  <script src="js/dark-mode.js"></script>
</head>
<body>

  <!-- Skip link for accessibility -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- HEADER -->
  <header>
    <a href="index.html" class="logo" aria-label="WoolCraft Studio Home">
      🧶 WoolCraft Studio
    </a>

    <button class="mobile-menu" onclick="toggleMobileMenu()" aria-label="Toggle navigation menu" aria-expanded="false">
      ☰
    </button>

    <nav id="navbar" role="navigation" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="cart.html" aria-label="Shopping cart">🛒 (<span id="cartCount">0</span>)</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
      <button id="darkModeToggle" class="nav-filter" onclick="toggleDarkMode()" aria-label="Toggle dark mode">🌙</button>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content">
    <section class="featured fade-up" aria-label="Contact Form Section">
      <h2>Contact Us</h2>
      <p class="section-desc">Have a question or want to discuss a custom order? Fill out the form below or message us directly on WhatsApp!</p>

      <form class="contact-form" novalidate>
        <div class="form-group">
          <input type="text" id="contactName" placeholder="Your Name" required aria-required="true">
        </div>
        <div class="form-group">
          <input type="email" id="contactEmail" placeholder="Email Address" required aria-required="true">
        </div>
        <div class="form-group">
          <input type="tel" id="contactPhone" placeholder="Phone Number (Optional)">
        </div>
        <div class="form-group">
          <textarea id="contactMessage" rows="6" placeholder="Your Message..." required aria-required="true"></textarea>
        </div>
        <button type="submit" class="btn checkout-btn">
          Send Message
        </button>
      </form>
    </section>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 WoolCraft Studio. All rights reserved.</p>
    <p><a href="about.html">About</a> · <a href="contact.html">Contact</a> · <a href="faq.html">FAQ</a></p>
  </footer>

  <!-- Floating WhatsApp -->
  <a href="https://wa.me/917973856211" class="floating-whatsapp" target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp">💬</a>

  <!-- Decorative orbs -->
  <div class="orb orb1" aria-hidden="true"></div>
  <div class="orb orb2" aria-hidden="true"></div>
  <div class="orb orb3" aria-hidden="true"></div>

  <!-- JS -->
  <script src="js/config.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/loader.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/contact.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
