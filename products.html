<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse our full collection of handmade wool crafts — flowers, headbands, brooches, Kanha dresses, bags and gift sets. Shop online at WoolCraft Studio.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#7a4f3d">
  <link rel="canonical" href="https://woolcraftstudio.com/products.html">

  <!-- Open Graph -->
  <meta property="og:title" content="Shop All Products | WoolCraft Studio">
  <meta property="og:description" content="Browse handmade wool flowers, headbands, brooches and more.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://woolcraftstudio.com/products.html">
  <meta property="og:image" content="https://woolcraftstudio.com/images/Sunflower.webp">

  <title>Shop All Products | WoolCraft Studio</title>
  <link rel="icon" href="images/logo.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" media="print" onload="this.media='all'">

  <script src="js/dark-mode.js"></script>
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- HEADER -->
  <header>
    <a href="index.html" class="logo" aria-label="WoolCraft Studio Home">🧶 WoolCraft Studio</a>

    <button class="mobile-menu" onclick="toggleMobileMenu()" aria-label="Toggle navigation menu" aria-expanded="false">☰</button>

    <nav id="navbar" role="navigation" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="cart.html" aria-label="Shopping cart">🛒 (<span id="cartCount">0</span>)</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <button id="darkModeToggle" class="nav-filter" onclick="toggleDarkMode()" aria-label="Toggle dark mode">🌙</button>
      <select id="categoryFilter" class="nav-filter" aria-label="Filter by category">
        <option value="">All Categories</option>
        <option value="Bags">Bags</option>
        <option value="Apparels">Apparels</option>
        <option value="Gift Sets">Gift Sets</option>
        <option value="Hanging Decorations">Hanging Decorations</option>
        <option value="Headbands">Headbands</option>
        <option value="Wool Flowers">Wool Flowers</option>
        <option value="Brooches">Brooches</option>
        <option value="Kanha Dresses">Kanha Dresses</option>
      </select>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content">
    <section class="featured" aria-label="All products">
      <h1 style="text-align:center; font-size:clamp(26px,4vw,40px); color:var(--text-heading); margin-bottom:var(--space-lg);">All Products</h1>

      <input
        type="search"
        id="searchInput"
        placeholder="Search products…"
        class="search-box"
        aria-label="Search products">

      <div class="product-grid" id="shopProducts">
        <!-- Rendered dynamically by js/products-page.js -->
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 WoolCraft Studio. All rights reserved.</p>
    <p><a href="about.html">About</a> · <a href="contact.html">Contact</a> · <a href="faq.html">FAQ</a></p>
  </footer>

  <!-- Floating Instagram & WhatsApp -->
  <a href="https://www.instagram.com/croch_etgallery706?igsh=YTJ6MTA1MXlzYXkz" class="floating-instagram" target="_blank" rel="noopener noreferrer" aria-label="Follow on Instagram">
    <i class="fab fa-instagram"></i>
  </a>
  <a href="https://wa.me/917973856211" class="floating-whatsapp" target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp">💬</a>

  <div class="orb orb1" aria-hidden="true"></div>
  <div class="orb orb2" aria-hidden="true"></div>
  <div class="orb orb3" aria-hidden="true"></div>

  <!-- JS -->
  <script src="js/config.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/loader.js"></script>
  <script src="js/products-page.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
