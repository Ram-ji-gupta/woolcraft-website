<!DOCTYPE html>
<html>
<head>
<title>Test Order</title>
</head>
<body>

<button onclick="placeOrder()">
Place Test Order
</button>

<script>

async function placeOrder(){

const order = {

customer:"Ram Gupta",

phone:"9876543210",

address:"Delhi",

items:[

{
product_id:1,
quantity:2,
price:299
},

{
product_id:2,
quantity:1,
price:199
}

]

};

try{

const response =
await fetch(
"http://localhost:5000/api/orders",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(order)
}
);

const data =
await response.json();

console.log(data);

alert(data.message);

}

catch(error){

console.log(error);

}

}

</script>

</body>
</html>
